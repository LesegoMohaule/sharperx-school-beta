<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>SharperX</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #14201f;
        background: #f4f7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(rgba(8, 127, 120, 0.08), rgba(8, 127, 120, 0.02)),
          #f4f7f5;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid #dce5e2;
        border-radius: 8px;
        padding: clamp(24px, 6vw, 42px);
        background: white;
        box-shadow: 0 18px 60px rgba(20, 32, 31, 0.12);
        text-align: center;
      }

      .mark {
        display: inline-grid;
        place-items: center;
        width: 58px;
        height: 58px;
        margin-bottom: 18px;
        border-radius: 8px;
        color: white;
        background: #087f78;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 8vw, 54px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 16px auto 0;
        max-width: 440px;
        color: #5b6b70;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">SX</div>
      <h1>SharperX is being built</h1>
      <p>
        The website is temporarily offline while the app, registration and payment systems are being prepared.
      </p>
    </main>
  </body>
</html>
